name: Poly Edge Performance Report

on:
  schedule:
    # Every Sunday at 09:00 UTC (2:30 PM IST)
    - cron: "0 9 * * 0"
  workflow_dispatch:
    # Manual trigger anytime from Actions tab
    inputs:
      dry_run:
        description: "Print report without sending Telegram"
        required: false
        default: "false"
        type: boolean

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run performance report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            node performance.js --dry-run
          else
            node performance.js
          fi
