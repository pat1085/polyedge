name: Poly Edge Scanner

on:
  schedule:
    # Runs every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab
    inputs:
      dry_run:
        description: "Run without sending Telegram alerts"
        required: false
        default: "false"
        type: boolean

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit alerted.json state back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            node scanner.js --dry-run
          else
            node scanner.js
          fi

      - name: Commit state (alerted.json + trades.json)
        run: |
          git config --global user.name  "polyedge-bot"
          git config --global user.email "polyedge-bot@users.noreply.github.com"
          git add alerted.json trades.json || true
          git diff --staged --quiet || git commit -m "chore: update scanner state [skip ci]"
          git push
